      # pre_ping: False
      # pretty_sql: False
      # schema_differ_overrides: 
      # catalog_type_overrides: 
      # method: no-auth
      # port: 
      # http_scheme: https
      # roles: 
      # http_headers: 
      # session_properties: 
      # retries: 3
      # timezone: 
      # password: 
      # verify: 
      # impersonation_user: 
      # keytab: 
      # krb5_config: 
      # principal: 
      # service_name: trino
